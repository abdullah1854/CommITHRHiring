openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GIQ HR Recruitment Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: jobs
    description: Job posting management
  - name: candidates
    description: Candidate management
  - name: resumes
    description: Resume upload and parsing
  - name: ai
    description: AI screening and analysis
  - name: interviews
    description: Interview scheduling
  - name: analytics
    description: Analytics and reporting
  - name: notifications
    description: Email notification management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, recruiter]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new internal user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Jobs
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job postings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, open, closed, archived]
        - name: department
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: employmentType
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: public
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job posting by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: public
          in: query
          description: When true, allow unauthenticated access but only return open jobs.
          schema:
            type: boolean
      responses:
        "200":
          description: Job posting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update job posting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete job posting (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /jobs/{id}/candidates:
    get:
      operationId: getJobCandidates
      tags: [jobs]
      summary: Get candidates for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [score, name, appliedAt]
      responses:
        "200":
          description: Candidates for this job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateListResponse"

  # Candidates
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates
      parameters:
        - name: jobId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateListResponse"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get candidate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCandidate
      tags: [candidates]
      summary: Update candidate notes/status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCandidateBody"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetail"
    delete:
      operationId: deleteCandidate
      tags: [candidates]
      summary: Delete candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /candidates/{id}/reject:
    post:
      operationId: rejectCandidate
      tags: [candidates]
      summary: Explicitly reject a candidate (requires HR approval)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectCandidateBody"
      responses:
        "200":
          description: Candidate rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetail"

  /candidates/{id}/shortlist:
    post:
      operationId: shortlistCandidate
      tags: [candidates]
      summary: Shortlist a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate shortlisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetail"

  # Resumes
  /resumes/upload:
    post:
      operationId: uploadResume
      tags: [resumes]
      summary: Upload a resume file and create candidate profile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, jobId]
              properties:
                file:
                  type: string
                  format: binary
                jobId:
                  type: string
                candidateName:
                  type: string
      responses:
        "201":
          description: Resume uploaded and candidate created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CandidateDetail"
                  - type: object
                    properties:
                      candidateId:
                        type: string
                    required:
                      - candidateId

  /resumes/{id}:
    get:
      operationId: getResume
      tags: [resumes]
      summary: Get resume by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"

  # AI Endpoints
  /ai/screen/{candidateId}/{jobId}:
    post:
      operationId: screenCandidate
      tags: [ai]
      summary: Run AI screening for a candidate against a job
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI screening result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIScreeningResult"

  /ai/rank/{jobId}:
    get:
      operationId: rankCandidates
      tags: [ai]
      summary: Get AI ranking of all candidates for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ranked candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateRankingResponse"

  /ai/summary/{candidateId}:
    post:
      operationId: generateCandidateSummary
      tags: [ai]
      summary: Generate AI candidate summary
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateSummary"

  /ai/interview-questions/{candidateId}/{jobId}:
    post:
      operationId: generateInterviewQuestions
      tags: [ai]
      summary: Generate AI interview questions
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewQuestionsBody"
      responses:
        "200":
          description: Interview questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewQuestionsResponse"

  /ai/generate-jd:
    post:
      operationId: generateJobDescription
      tags: [ai]
      summary: Generate a job description using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateJDBody"
      responses:
        "200":
          description: Generated job description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedJDResponse"

  /ai/improve-jd:
    post:
      operationId: improveJobDescription
      tags: [ai]
      summary: Improve an existing job description using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveJDBody"
      responses:
        "200":
          description: Improved job description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedJDResponse"

  /ai/screening-results/{candidateId}/{jobId}:
    get:
      operationId: getScreeningResult
      tags: [ai]
      summary: Get existing AI screening result
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI screening result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIScreeningResult"
        "404":
          description: No screening result found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Interviews
  /interviews:
    get:
      operationId: listInterviews
      tags: [interviews]
      summary: List interviews
      parameters:
        - name: jobId
          in: query
          schema:
            type: string
        - name: candidateId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of interviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewListResponse"
    post:
      operationId: scheduleInterview
      tags: [interviews]
      summary: Schedule an interview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInterviewBody"
      responses:
        "201":
          description: Interview scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"

  /interviews/{id}:
    get:
      operationId: getInterview
      tags: [interviews]
      summary: Get interview by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Interview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"
    put:
      operationId: updateInterview
      tags: [interviews]
      summary: Update interview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterviewBody"
      responses:
        "200":
          description: Updated interview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interview"
    delete:
      operationId: deleteInterview
      tags: [interviews]
      summary: Cancel interview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /interviews/{id}/send-invite:
    post:
      operationId: sendInterviewInvite
      tags: [interviews]
      summary: Send interview invite email to candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Analytics
  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get recruitment analytics overview
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/pipeline:
    get:
      operationId: getPipelineAnalytics
      tags: [analytics]
      summary: Get recruitment pipeline funnel data
      responses:
        "200":
          description: Pipeline data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineAnalytics"

  /analytics/jobs:
    get:
      operationId: getJobAnalytics
      tags: [analytics]
      summary: Get per-job analytics
      responses:
        "200":
          description: Job analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAnalyticsResponse"

  /analytics/activity:
    get:
      operationId: getActivityTrends
      tags: [analytics]
      summary: Get hiring activity trends
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Activity trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityTrendsResponse"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List email notification logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Notification logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - total
        - page
        - limit
        - totalPages

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, recruiter]
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - isActive
        - createdAt
        - updatedAt

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - users
        - meta

    CreateUserBody:
      type: object
      required: [email, name, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, recruiter]
        password:
          type: string

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, recruiter]
        isActive:
          type: boolean

    Job:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        department:
          type: string
        location:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, contract, internship]
        seniority:
          type: string
          enum: [entry, mid, senior, lead, executive]
        requiredSkills:
          type: array
          items:
            type: string
        preferredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
          nullable: true
        maxExperience:
          type: integer
          nullable: true
        minSalary:
          type: integer
          nullable: true
        maxSalary:
          type: integer
          nullable: true
        salaryCurrency:
          type: string
          nullable: true
        description:
          type: string
        responsibilities:
          type: string
        qualifications:
          type: string
        status:
          type: string
          enum: [draft, open, closed, archived]
        createdById:
          type: string
          nullable: true
        createdBy:
          $ref: "#/components/schemas/User"
          nullable: true
        candidateCount:
          type: integer
        suggestedRequiredSkills:
          type: array
          items:
            type: string
          description: Conservative suggestions derived from the JD when requiredSkills is empty.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - department
        - location
        - employmentType
        - seniority
        - requiredSkills
        - preferredSkills
        - description
        - responsibilities
        - qualifications
        - status
        - candidateCount
        - suggestedRequiredSkills
        - createdAt
        - updatedAt

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - jobs
        - meta

    CreateJobBody:
      type: object
      required: [title, department, location, employmentType, seniority, description, responsibilities, qualifications]
      properties:
        title:
          type: string
        department:
          type: string
        location:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, contract, internship]
        seniority:
          type: string
          enum: [entry, mid, senior, lead, executive]
        requiredSkills:
          type: array
          items:
            type: string
          default: []
        preferredSkills:
          type: array
          items:
            type: string
          default: []
        minExperience:
          type: integer
          nullable: true
        maxExperience:
          type: integer
          nullable: true
        minSalary:
          type: integer
          nullable: true
        maxSalary:
          type: integer
          nullable: true
        salaryCurrency:
          type: string
          nullable: true
        description:
          type: string
        responsibilities:
          type: string
        qualifications:
          type: string
        status:
